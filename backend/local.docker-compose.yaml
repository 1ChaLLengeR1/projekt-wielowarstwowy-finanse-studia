services:
  db:
    image: postgres:17
    env_file:
      - env/local.env
    ports:
      - "5432:5432"
    volumes:
      - ./database/sql/database_up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/sql/users.sql:/docker-entrypoint-initdb.d/02_users.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_project"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - project_finance

  project_finance:
    build:
      context: .
      dockerfile: dockerfiles/local.dockerfile
    ports:
      - "3000:3000"
    env_file:
      - env/local.env
    environment:
      - DB_HOST=db
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - project_finance


networks:
  project_finance:
    driver: bridge