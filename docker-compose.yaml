services:
  db:
    image: postgres:17
    env_file:
      - ./backend/env/local.env
    ports:
      - "5432:5432"
    volumes:
      - ./backend/database/sql/database_up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/database/sql/users.sql:/docker-entrypoint-initdb.d/02_users.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_project"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - project_job

  backend:
    build:
      context: ./backend
      dockerfile: dockerfiles/local.dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/env/local.env
    environment:
      - DB_HOST=db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - project_job

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfiles/local.dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    networks:
      - project_job


networks:
  project_job:
    driver: bridge